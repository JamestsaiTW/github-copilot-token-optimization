name: Translate zh-TW Docs

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'docs/**/*.md'
      - '!README.zh-TW.md'
      - '!docs/**/*.zh-TW.md'
      - '.github/workflows/translate-zh-tw.yml'
      - 'scripts/translate_zh_tw.py'
  workflow_dispatch:
    inputs:
      translate_all:
        description: Translate all supported English markdown files
        required: false
        default: false
        type: boolean
      model:
        description: GitHub Models model id
        required: false
        default: openai/gpt-4.1-mini
        type: string

permissions:
  contents: write
  models: read

concurrency:
  group: translate-zh-tw
  cancel-in-progress: true

env:
  DEFAULT_TRANSLATE_MODEL: openai/gpt-4.1-mini

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Taiwanese Mandarin translation skill
        run: npx --yes taiwanese-mandarin-translate-skill init --target copilot

      - name: Generate zh-TW translations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          TRANSLATE_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.translate_all || false }}
          TRANSLATE_MODEL: ${{ github.event_name == 'workflow_dispatch' && inputs.model || env.DEFAULT_TRANSLATE_MODEL }}
          TRANSLATION_OUTPUT_DIR: ${{ runner.temp }}/zh-tw-output
        run: python scripts/translate_zh_tw.py

      - name: Prepare zh-TW worktree
        id: worktree
        shell: bash
        run: |
          worktree_dir="$RUNNER_TEMP/zh-TW-worktree"
          rm -rf "$worktree_dir"

          if git ls-remote --exit-code --heads origin zh-TW >/dev/null 2>&1; then
            git fetch origin zh-TW
            git worktree add -B zh-TW "$worktree_dir" origin/zh-TW
          else
            git worktree add -b zh-TW "$worktree_dir" HEAD
          fi

          echo "worktree_dir=$worktree_dir" >> "$GITHUB_OUTPUT"

      - name: Apply translated files
        env:
          TRANSLATION_OUTPUT_DIR: ${{ runner.temp }}/zh-tw-output
          ZH_TW_WORKTREE: ${{ steps.worktree.outputs.worktree_dir }}
        run: |
          python - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          output_dir = Path(os.environ["TRANSLATION_OUTPUT_DIR"])
          worktree = Path(os.environ["ZH_TW_WORKTREE"])
          manifest_path = output_dir / "manifest.json"
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))

          for rel_path in manifest.get("written", []):
            source = output_dir / rel_path
            destination = worktree / rel_path
            destination.parent.mkdir(parents=True, exist_ok=True)
            shutil.copy2(source, destination)

          for rel_path in manifest.get("deleted", []):
            destination = worktree / rel_path
            if destination.exists():
              destination.unlink()
          PY

      - name: Commit and push zh-TW updates
        working-directory: ${{ steps.worktree.outputs.worktree_dir }}
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No zh-TW updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A README.zh-TW.md docs

          if git diff --cached --quiet; then
            echo "No staged zh-TW changes."
            exit 0
          fi

          git commit -m "Update zh-TW translations from main"
          git push origin HEAD:zh-TW
